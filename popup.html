<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CLIget for Brave</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h3>
    <span>CLIget for Brave</span>
    <button class="clear-btn" id="clearBtn">Clear All</button>
  </h3>

  <div class="option-row">
    <label class="checkbox-label">
      <input type="checkbox" id="autoCancelCheck"> Auto-cancel browser downloads
    </label>
    <div class="extra-args-container">
      <label for="extraArgsInput">Extra CLI Arguments:</label>
      <input type="text" id="extraArgsInput" placeholder="e.g. -c --check-certificate=false -d /downloads">
    </div>
  </div>

  <div class="download-list-container" id="downloadList">
    <div class="no-downloads">No downloads captured yet</div>
  </div>

  <div id="detailsArea" style="display: none;">
    <div class="command-container">
      <div class="command-header">
        <span>cURL Command</span>
        <button class="copy-btn" id="copyCurl">Copy</button>
      </div>
      <textarea class="command-box" id="curlBox" readonly></textarea>
    </div>

    <div class="command-container">
      <div class="command-header">
        <span>Wget Command</span>
        <button class="copy-btn" id="copyWget">Copy</button>
      </div>
      <textarea class="command-box" id="wgetBox" readonly></textarea>
    </div>

    <div class="command-container">
      <div class="command-header">
        <span>Aria2 Command</span>
        <button class="copy-btn" id="copyAria2">Copy</button>
      </div>
      <textarea class="command-box" id="aria2Box" readonly></textarea>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
