<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CLIget for Brave</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 12px;
      width: 480px;
      background-color: #f9f9fb;
      color: #333;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clear-btn {
      background: none;
      border: 1px solid #d1d5da;
      color: #666;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }
    .clear-btn:hover {
      background-color: #ffeef0;
      border-color: #fca5a5;
      color: #f87171;
    }
    .option-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      background: #fff;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #e1e4e8;
    }
    .option-row label {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .option-row input[type="checkbox"] {
      margin-right: 8px;
    }
    .extra-args-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .extra-args-container label {
      font-size: 11px;
      color: #666;
      font-weight: bold;
    }
    .extra-args-container input[type="text"] {
      padding: 6px;
      border: 1px solid #d1d5da;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    .download-list-container {
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 12px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      background: #fff;
    }
    .download-item {
      padding: 8px;
      font-size: 12px;
      border-bottom: 1px solid #e1e4e8;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .download-item:last-child {
      border-bottom: none;
    }
    .download-item.selected {
      background-color: #007aff;
      color: #fff;
    }
    .command-container {
      margin-bottom: 12px;
    }
    .command-header {
      font-size: 11px;
      font-weight: bold;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .command-box {
      background-color: #272822;
      color: #f8f8f2;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    button.copy-btn {
      background-color: #e1e4e8;
      border: none;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      cursor: pointer;
    }
    button.copy-btn:hover {
      background-color: #d1d5da;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    .btn-primary {
      background-color: #34c759;
      color: #fff;
    }
    .btn-danger {
      background-color: #ff3b30;
      color: #fff;
    }
    .no-downloads {
      padding: 16px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h3>
    <span>CLIget for Brave</span>
    <button class="clear-btn" id="clearBtn">Clear All</button>
  </h3>

  <div class="option-row">
    <label>
      <input type="checkbox" id="autoPauseCheck"> Auto-pause new browser downloads
    </label>
    <div class="extra-args-container">
      <label for="extraArgsInput">Extra CLI Arguments:</label>
      <input type="text" id="extraArgsInput" placeholder="e.g. -c --check-certificate=false -d /downloads">
    </div>
  </div>

  <div class="download-list-container" id="downloadList">
    <div class="no-downloads">No downloads captured yet</div>
  </div>

  <div id="detailsArea" style="display: none;">
    <div class="actions">
      <button class="btn btn-primary" id="resumeBtn">Resume in Browser</button>
      <button class="btn btn-danger" id="cancelBtn">Cancel Browser Download</button>
    </div>

    <div class="command-container">
      <div class="command-header">
        <span>cURL Command</span>
        <button class="copy-btn" id="copyCurl">Copy</button>
      </div>
      <div class="command-box" id="curlBox"></div>
    </div>

    <div class="command-container">
      <div class="command-header">
        <span>Wget Command</span>
        <button class="copy-btn" id="copyWget">Copy</button>
      </div>
      <div class="command-box" id="wgetBox"></div>
    </div>

    <div class="command-container">
      <div class="command-header">
        <span>Aria2 Command</span>
        <button class="copy-btn" id="copyAria2">Copy</button>
      </div>
      <div class="command-box" id="aria2Box"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
